<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Norwegian Half Marathon Plan — 1:40 Goal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0f;
  --surface:#141519;
  --surface2:#1c1e24;
  --border:#2a2d36;
  --border2:#363a45;
  --text:#f0f0ec;
  --muted:#7a7d8a;
  --dim:#3d4050;
  --accent:#c8f542;
  --accent-dark:#a8d030;
  --blue:#4aa8ff;
  --pink:#ff6b9d;
  --amber:#ffb84d;
  --teal:#3dd9a4;
  --font-head:'Syne',sans-serif;
  --font-body:'DM Mono',monospace;
  --font-serif:'Instrument Serif',serif;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:13px;
  line-height:1.6;
  min-height:100vh;
}

/* HEADER */
.header{
  border-bottom:1px solid var(--border);
  padding:2rem 2.5rem 1.5rem;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:2rem;
  flex-wrap:wrap;
}
.header-left h1{
  font-family:var(--font-head);
  font-size:clamp(22px,4vw,38px);
  font-weight:800;
  letter-spacing:-0.02em;
  line-height:1.05;
  color:var(--text);
}
.header-left h1 span{color:var(--accent)}
.header-left p{
  font-family:var(--font-body);
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.header-stats{
  display:flex;
  gap:2rem;
  flex-wrap:wrap;
}
.stat{text-align:right}
.stat-val{
  font-family:var(--font-head);
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
}
.stat-label{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 90px);overflow:hidden}
.sidebar{
  width:260px;
  flex-shrink:0;
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:1.25rem 0;
}
.main{flex:1;overflow-y:auto;padding:2rem 2.5rem}

/* NAV TABS */
.nav-section{
  padding:0 1rem .5rem;
  font-size:10px;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.1em;
  font-weight:500;
}
.nav-tab{
  display:block;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  cursor:pointer;
  padding:.6rem 1.25rem;
  font-family:var(--font-body);
  font-size:12px;
  color:var(--muted);
  transition:color .15s,background .15s;
}
.nav-tab:hover{background:var(--surface);color:var(--text)}
.nav-tab.active{color:var(--accent);background:rgba(200,245,66,.07)}
.nav-tab.active .wk-dot{background:var(--accent)}
.nav-tab-inner{display:flex;justify-content:space-between;align-items:center}
.wk-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--border2);
  flex-shrink:0;
}
.nav-mi{font-size:10px;color:var(--dim)}
.phase-header{
  padding:.75rem 1.25rem .25rem;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.1em;
  font-weight:500;
  margin-top:.5rem;
}
.ph-1{color:#3B6D11}
.ph-2{color:#185FA5}
.ph-3{color:#993556}
.ph-4{color:#BA7517}
.cutback-tag{
  font-size:9px;
  background:rgba(255,184,77,.15);
  color:var(--amber);
  padding:1px 6px;
  border-radius:20px;
  margin-left:4px;
}

/* TOP NAV (views) */
.view-tabs{
  display:flex;
  gap:4px;
  margin-bottom:1.75rem;
  border-bottom:1px solid var(--border);
  padding-bottom:1rem;
  flex-wrap:wrap;
}
.vtab{
  padding:6px 14px;
  border-radius:6px;
  border:.5px solid var(--border2);
  background:transparent;
  font-size:12px;
  cursor:pointer;
  color:var(--muted);
  font-family:var(--font-body);
  transition:all .15s;
}
.vtab:hover{border-color:var(--border2);color:var(--text)}
.vtab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}

/* WEEK VIEW */
.week-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:1.25rem;
  gap:1rem;
  flex-wrap:wrap;
}
.week-title{
  font-family:var(--font-head);
  font-size:26px;
  font-weight:700;
  letter-spacing:-.01em;
}
.week-meta{
  font-size:11px;
  color:var(--muted);
  margin-top:3px;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.week-miles{
  font-family:var(--font-head);
  font-size:42px;
  font-weight:800;
  color:var(--accent);
  line-height:1;
  text-align:right;
}
.week-miles-label{
  font-size:11px;
  color:var(--muted);
  text-align:right;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.cutback-banner{
  background:rgba(255,184,77,.1);
  border:1px solid rgba(255,184,77,.25);
  border-radius:8px;
  padding:.75rem 1rem;
  font-size:12px;
  color:var(--amber);
  margin-bottom:1.25rem;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.week-note{
  background:var(--surface2);
  border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;
  padding:.75rem 1rem;
  font-size:12px;
  color:var(--muted);
  margin-bottom:1.25rem;
  line-height:1.7;
}

/* DAY CARDS */
.day-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}
.day-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1rem 1.1rem;
  transition:border-color .15s;
}
.day-card:hover{border-color:var(--border2)}
.day-card.race-day{
  border-color:var(--accent);
  background:rgba(200,245,66,.05);
}
.day-card.done{
  border-color:rgba(61,217,164,.35);
  background:rgba(61,217,164,.04);
  opacity:.85;
}
.day-card.done .day-name{color:var(--muted)}
.day-card.done .day-desc{opacity:.6}
.day-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:.5rem;
}
.day-name{
  font-family:var(--font-head);
  font-size:13px;
  font-weight:700;
  letter-spacing:.01em;
  color:var(--text);
  transition:color .2s;
}
.day-mi{
  font-size:11px;
  color:var(--muted);
  font-family:var(--font-body);
}
.tick-btn{
  width:22px;height:22px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .18s;
  color:transparent;
  font-size:12px;
  margin-left:8px;
}
.tick-btn:hover{border-color:var(--teal);color:var(--teal)}
.tick-btn.ticked{
  background:var(--teal);
  border-color:var(--teal);
  color:#000;
}
.week-progress{
  font-size:11px;
  color:var(--muted);
  margin-top:3px;
}
.week-progress span{color:var(--teal);font-weight:500}
.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:500;
  padding:2px 8px;
  border-radius:20px;
  margin-bottom:.5rem;
  font-family:var(--font-head);
  letter-spacing:.03em;
  text-transform:uppercase;
}
.b-rest{background:rgba(255,255,255,.06);color:var(--muted)}
.b-easy{background:rgba(61,217,164,.12);color:var(--teal)}
.b-recovery{background:rgba(74,168,255,.12);color:var(--blue)}
.b-threshold{background:rgba(200,245,66,.12);color:var(--accent)}
.b-hills{background:rgba(255,184,77,.12);color:var(--amber)}
.b-long{background:rgba(255,107,157,.12);color:var(--pink)}
.b-vo2{background:rgba(255,100,100,.12);color:#ff8080}
.b-race{background:var(--accent);color:#000}
.day-desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.day-desc strong{color:var(--text)}

/* OVERVIEW / CHART */
.chart-section{margin-bottom:2rem}
.section-title{
  font-family:var(--font-head);
  font-size:16px;
  font-weight:700;
  color:var(--text);
  margin-bottom:1rem;
  letter-spacing:-.01em;
}
.chart-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
}
.chart-canvas-wrap{position:relative;width:100%;height:200px}
.legend{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-top:1rem;
  font-size:11px;
  color:var(--muted);
}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* PACE TABLE */
.pace-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
.pace-table th{
  text-align:left;
  padding:.6rem .75rem;
  font-size:10px;
  font-weight:500;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:1px solid var(--border);
  font-family:var(--font-head);
}
.pace-table td{
  padding:.75rem .75rem;
  border-bottom:1px solid var(--border);
  vertical-align:top;
  color:var(--muted);
}
.pace-table tr:last-child td{border-bottom:none}
.pace-table tr:hover td{background:var(--surface2)}
.pace-val{
  font-family:var(--font-head);
  font-size:15px;
  font-weight:700;
  color:var(--text);
}
.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  margin-bottom:2rem;
}
.info-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1rem 1.1rem;
}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.info-val{
  font-family:var(--font-head);
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}
.info-sub{font-size:11px;color:var(--dim);margin-top:2px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* RESPONSIVE */
@media(max-width:700px){
  .layout{flex-direction:column;height:auto}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:.5rem;gap:.25rem}
  .phase-header,.nav-section{display:none}
  .nav-tab{white-space:nowrap;border-radius:20px;border:.5px solid var(--border2);padding:.4rem .9rem}
  .nav-tab.active{background:rgba(200,245,66,.1)}
  .main{padding:1.25rem}
  .header{padding:1.25rem}
  .day-grid{grid-template-columns:1fr}
  .week-miles{font-size:32px}
}
</style>
</head>

</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

let state={view:'week',week:1};
let chart=null;

function sidebar(){
  const s=document.getElementById('sidebar');
  let h='<button class="nav-tab'+(state.view==='overview'?' active':'')+'" onclick="showView(\'overview\')">Overview & paces</button>';
  PHASES.forEach(ph=>{
    h+=`<div class="phase-header ${ph.cls}">${ph.label}</div>`;
    PLAN.filter(w=>w.ph===ph.n).forEach(w=>{
      const{done,total}=weekDoneCount(w.n);
      const allDone=total>0&&done===total;
      h+=`<button class="nav-tab${state.week===w.n&&state.view==='week'?' active':''}" onclick="showWeek(${w.n})">
        <div class="nav-tab-inner">
          <span>Wk ${w.n} · ${w.wk}${w.cut?`<span class="cutback-tag">cutback</span>`:''}</span>
          <span style="display:flex;align-items:center;gap:5px">
            <span class="nav-mi">${w.mi} mi</span>
            ${allDone?'<span style="color:var(--teal);font-size:11px">✓</span>':done>0?`<span style="font-size:9px;color:var(--muted)">${done}/${total}</span>`:''}
          </span>
        </div>
      </button>`;
    });
  });
  s.innerHTML=h;
}

function showView(v){
  state.view=v;
  sidebar();
  renderMain();
}

function showWeek(n){
  state.week=n;
  state.view='week';
  sidebar();
  renderMain();
  // Scroll active into view in sidebar
  const active=document.querySelector('.nav-tab.active');
  if(active) active.scrollIntoView({block:'nearest'});
}

function renderMain(){
  if(state.view==='overview') renderOverview();
  else renderWeek();
}

function renderOverview(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="view-tabs">

    <div class="info-grid">
      <div class="info-card"><div class="info-label">Race date</div><div class="info-val">Nov 28</div><div class="info-sub">2025 · 36 weeks</div></div>
      <div class="info-card"><div class="info-label">Goal time</div><div class="info-val">1:40:00</div><div class="info-sub">20 min PR improvement</div></div>
      <div class="info-card"><div class="info-label">Goal pace</div><div class="info-val">7:38/mi</div><div class="info-sub">Per mile average</div></div>
      <div class="info-card"><div class="info-label">Peak mileage</div><div class="info-val">50 mi</div><div class="info-sub">Week 27 · Sep 18</div></div>
      <div class="info-card"><div class="info-label">Threshold pace</div><div class="info-val">8:15–8:30</div><div class="info-sub">Core Norwegian zone</div></div>
      <div class="info-card"><div class="info-label">Easy pace</div><div class="info-val">9:30–10:30</div><div class="info-sub">Majority of volume</div></div>
    </div>
    <div class="chart-section">
      <div class="section-title">Weekly mileage · 36 weeks</div>
      <div class="chart-wrap">
        <div class="chart-canvas-wrap"><canvas id="overviewChart"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Phase 1 — Base (wk 1–10)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Phase 2 — Build (wk 11–20)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#993556"></div>Phase 3 — Peak (wk 21–30)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Phase 4 — Taper (wk 31–36)</div>
        </div>
      </div>
    </div>
    <div class="section-title" style="margin-top:2rem">Target paces</div>
    <div class="chart-wrap" style="margin-top:.75rem">
      <table class="pace-table">
        <thead><tr><th>Type</th><th>Pace</th><th>Feel</th><th>When</th></tr></thead>
        <tbody>
          <tr><td>${TYPE_BADGE.recovery}<br>Very easy</td><td><div class="pace-val">10:30–11:30</div></td><td>Full conversation, nasal only</td><td>Day after threshold</td></tr>
          <tr><td>${TYPE_BADGE.easy}<br>Aerobic base</td><td><div class="pace-val">9:30–10:30</div></td><td>Full sentences, relaxed</td><td>Daily easy runs, long runs</td></tr>
          <tr><td>${TYPE_BADGE.threshold}<br>Norwegian core</td><td><div class="pace-val">8:15–8:30</div></td><td>4–5 words only. ~2–3 mmol/L lactate</td><td>Tue/Thu sessions</td></tr>
          <tr><td>${TYPE_BADGE.long}<br>Race pace</td><td><div class="pace-val">7:38</div></td><td>Hard, controlled. Phase 3 only</td><td>Long run segments, wk 23+</td></tr>
          <tr><td>${TYPE_BADGE.vo2}<br>VO₂max</td><td><div class="pace-val">7:10–7:20</div></td><td>Very hard. 3-min reps only</td><td>Thursday, Phase 3 wk 26–29</td></tr>
        </tbody>
      </table>
    </div>
  `;
  setTimeout(()=>{
    const canvas=document.getElementById('overviewChart');
    if(!canvas) return;
    if(chart){chart.destroy();chart=null;}
    chart=new Chart(canvas,{
      type:'bar',
      data:{
        labels:PLAN.map(w=>'W'+w.n),
        datasets:[{
          data:PLAN.map(w=>w.mi),
          backgroundColor:CHART_COLORS,
          borderRadius:3,
          borderSkipped:false,
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+' miles'},backgroundColor:'#1c1e24',titleColor:'#f0f0ec',bodyColor:'#7a7d8a',borderColor:'#2a2d36',borderWidth:1}},
        scales:{
          x:{ticks:{color:'#3d4050',font:{size:10,family:'DM Mono'},maxTicksLimit:18,autoSkip:true},grid:{display:false},border:{color:'#2a2d36'}},
          y:{min:0,max:55,ticks:{color:'#3d4050',font:{size:11,family:'DM Mono'},stepSize:10},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'#2a2d36'}},
        }
      }
    });
  },100);
}

function getCompleted(){try{return JSON.parse(localStorage.getItem('nr_completed')||'{}')}catch{return{}}}
function setCompleted(obj){try{localStorage.setItem('nr_completed',JSON.stringify(obj))}catch{}}
function sessionKey(wn,di){return 'w'+wn+'-d'+di}
function toggleDone(wn,di){const c=getCompleted();const k=sessionKey(wn,di);if(c[k])delete c[k];else c[k]=1;setCompleted(c);renderWeek();}
function weekDoneCount(wn){const c=getCompleted();const w=PLAN.find(x=>x.n===wn);if(!w)return{done:0,total:0};const total=w.days.filter(d=>d.t!=='rest').length;const done=w.days.filter((d,i)=>d.t!=='rest'&&c[sessionKey(wn,i)]).length;return{done,total};}

function renderWeek(){
  const w=PLAN.find(x=>x.n===state.week);
  if(!w) return;
  const ph=PHASES.find(p=>p.n===w.ph);
  const m=document.getElementById('main');
  let h=`
    <div class="view-tabs">
      <button class="vtab" onclick="showView('overview')">Overview</button>
      ${state.week>1?`<button class="vtab" onclick="showWeek(${state.week-1})">← Prev</button>`:''}
      ${state.week<36?`<button class="vtab active" onclick="showWeek(${state.week+1})">Next week →</button>`:'<span class="vtab active">Final week</span>'}
    </div>
    <div class="week-header">
      <div>
        <div class="week-title">Week ${w.n} <span style="color:var(--muted);font-weight:400">· ${w.wk}</span></div>
        <div class="week-meta ${ph.cls}">${ph.label}</div>
      </div>
      <div style="text-align:right">
        <div class="week-miles">${w.mi}</div>
        <div class="week-miles-label">miles target</div>
        ${(()=>{const{done,total}=weekDoneCount(w.n);return total>0?`<div style="font-size:11px;color:var(--muted);margin-top:4px"><span style="color:var(--teal);font-weight:500">${done}</span>/${total} sessions done</div>`:''})()}
      </div>
    </div>
  `;
  if(w.cut) h+=`<div class="cutback-banner">✦ Cutback week — approximately 80% of prior volume. Do not fill it back in. This is where adaptation happens.</div>`;
  if(w.note) h+=`<div class="week-note">${w.note}</div>`;
  const completed=getCompleted();
  h+=`<div class="day-grid">`;
  w.days.forEach((day,i)=>{
    const isRace=day.t==='race';
    const isRest=day.t==='rest';
    const k=sessionKey(w.n,i);
    const done=!!completed[k];
    h+=`<div class="day-card${isRace?' race-day':''}${done?' done':''}">
      <div class="day-top">
        <div class="day-name">${day.d}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="day-mi">${day.m>0?day.m+' mi':''}</div>
          ${!isRest?`<button class="tick-btn${done?' ticked':''}" onclick="toggleDone(${w.n},${i})" title="${done?'Mark incomplete':'Mark complete'}">✓</button>`:''}
        </div>
      </div>
      ${TYPE_BADGE[day.t]||''}
      <div class="day-desc">${day.desc}</div>
    </div>`;
  });
  h+=`</div>`;
  // Nav at bottom
  h+=`<div style="display:flex;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);">
    ${state.week>1?`<button class="vtab" onclick="showWeek(${state.week-1})">← Week ${state.week-1}</button>`:''}
    ${state.week<36?`<button class="vtab active" onclick="showWeek(${state.week+1})">Week ${state.week+1} →</button>`:''}
  </div>`;
  m.innerHTML=h;
}

// Init
sidebar();
renderOverview();
</script>
